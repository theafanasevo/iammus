name: Deploy to Cloudflare Pages

on:
  push:
    paths:
      - 'package.json'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 2

      - name: Check version change
        id: version
        run: |
          OLD=$(git show HEAD^:package.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          NEW=$(python3 -c "import json; print(json.load(open('package.json'))['version'])")
          echo "Old version: $OLD"
          echo "New version: $NEW"
          if [ "$OLD" != "$NEW" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Cloudflare Deploy
        if: steps.version.outputs.changed == 'true'
        run: |
          curl -X POST "${{ secrets.CLOUDFLARE_DEPLOY_HOOK }}"
          echo "✅ Cloudflare deployment triggered!"

      - name: Skip Deploy
        if: steps.version.outputs.changed == 'false'
        run: echo "⏭️ Version unchanged, skipping deployment."
